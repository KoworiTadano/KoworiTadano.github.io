<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>うごく3目並べ</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <main class="game">
      <header>
        <p class="eyebrow">VS CPU</p>
        <h1>うごく3目並べ</h1>
        <p class="rule">ターンの始めに、すべてのコマが次の番号へ移動します。</p>
      </header>

      <section id="setup" class="panel" aria-labelledby="setup-title">
        <h2 id="setup-title">先攻・後攻を選ぶ</h2>
        <div class="choice-buttons">
          <button type="button" data-order="first">先攻（○）</button>
          <button type="button" data-order="second">後攻（○）</button>
        </div>
      </section>

      <section id="play-area" class="play-area" hidden>
        <div class="status-panel">
          <p id="status" class="status" aria-live="polite"></p>
          <p id="detail" class="detail"></p>
        </div>

        <div id="board" class="board" aria-label="3目並べの盤面"></div>

        <button id="restart" class="restart" type="button">先攻・後攻を選び直す</button>
      </section>

      <footer class="site-footer">
        <a href="/">kowori.net</a>
      </footer>
    </main>

    <script src="app.js"></script>
  </body>
</html>
